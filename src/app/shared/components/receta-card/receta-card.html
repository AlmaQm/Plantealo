<!-- src/app/shared/components/receta-card/receta-card.component.html -->
<div class="receta-card" (click)="onCardClick()">
  <div class="receta-card__image">
    <img [src]="recipe.imageUrl" [alt]="recipe.name" 
         (error)="recipe.imageUrl = 'assets/images/placeholder-receta.jpg'">
    <div class="receta-card__compatibility" [class]="'compatibility--' + compatibilityPercentage">
      <span>{{ compatibilityPercentage }}%</span>
    </div>
  </div>
  
  <div class="receta-card__content">
    <h3 class="receta-card__title">{{ recipe.name }}</h3>
    
    <div class="receta-card__meta">
      <div class="meta-item">
        <span class="meta-icon">⏱️</span>
        <span>{{ getEstimatedTime() }}</span>
      </div>
      <div class="meta-item">
        <span class="meta-icon">👥</span>
        <span>{{ getServings() }} personas</span>
      </div>
      <div class="meta-item">
        <span class="meta-icon">📊</span>
        <span>{{ getDifficulty() }}</span>
      </div>
    </div>
    
    <div class="receta-card__badges">
      <!-- Mostrar el tipo de dieta de la receta -->
      <span *ngIf="recipe.type_dieta.includes('vegana')" class="badge badge--vegana">
        🌱 Vegana
      </span>
      <span *ngIf="recipe.type_dieta.includes('vegetariana') && !recipe.type_dieta.includes('vegana')" 
            class="badge badge--vegetariana">
        🥬 Vegetariana
      </span>
      <span class="badge badge--category">{{ getCategoryText() }}</span>
      <span *ngIf="recipe.season && recipe.season.length > 0" class="badge badge--season">
        📅 {{ getSeasonText() }}
      </span>
    </div>
    
    <p class="receta-card__description">{{ recipe.description }}</p>
    
    <div class="receta-card__compatibility-bar">
      <div class="compatibility-bar__fill" [style.width.%]="compatibilityPercentage"></div>
    </div>
  </div>
</div>
