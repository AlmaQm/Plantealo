@if (visible()) {
  <div class="confirm-overlay" (click)="cancelar.emit()">
    <div class="confirm-modal" (click)="$event.stopPropagation()">
      <p class="confirm-modal__mensaje">{{ mensaje() }}</p>
      <div class="confirm-modal__botons">
        <button class="confirm-modal__btn confirm-modal__btn--cancel"
                (click)="cancelar.emit()">
          No
        </button>
        <button class="confirm-modal__btn confirm-modal__btn--confirm"
                (click)="confirmar.emit()">
          Sí, eliminar
        </button>
      </div>
    </div>
  </div>
}
