<h3 class="summary-title">Resumen del Huerto</h3>

<div class="summary-box">
   <div class="stat-row">
      <div class="label-group">
         <span class="label-text">Plantas listas para cosechar</span>
         <span class="label-value">{{ harvestReady }}/{{ totalPlants }}</span>
      </div>
      <div class="progress-container">
         <div class="progress-bar-bg">
            <div class="progress-bar-fill" [style.width.%]="harvestPercentage"></div>
         </div>
      </div>
   </div>

   <div class="stat-row">
      <div class="label-group">
         <span class="label-text">Tareas completadas</span>
         <span class="label-value">{{ tasksCompleted }}/{{ totalTasks }}</span>
      </div>
      <div class="progress-container">
         <div class="progress-bar-bg">
            <div class="progress-bar-fill" [style.width.%]="tasksPercentage"></div>
         </div>
      </div>
   </div>
</div>
