<div class="stat-row">
   <div class="stat-chip">
      <span class="chip-icon">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v20"/>
            <path d="M8 6c0 2 2 3 4 3s4-1 4-3"/>
            <path d="M6 11c0 2 2 3 6 3s6-1 6-3"/>
            <path d="M5 16c0 2 3 3 7 3s7-1 7-3"/>
         </svg>
      </span>
      <div class="chip-text">
         <span class="chip-num">{{ harvestReady }}</span>
         <span class="chip-label">Cosechas</span>
      </div>
   </div>

   <div class="stat-chip">
      <span class="chip-icon">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22c4-2 7-5 7-10a7 7 0 10-14 0c0 5 3 8 7 10z"/>
         </svg>
      </span>
      <div class="chip-text">
         <span class="chip-num">{{ totalPlants }}</span>
         <span class="chip-label">Plantas</span>
      </div>
   </div>

   <div class="stat-chip">
      <span class="chip-icon">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6L9 17l-5-5"/>
         </svg>
      </span>
      <div class="chip-text">
         <span class="chip-num">{{ tasksCompleted }}/{{ totalTasks }}</span>
         <span class="chip-label">Tareas</span>
      </div>
   </div>
</div>
