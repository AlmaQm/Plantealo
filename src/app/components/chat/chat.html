@if (obert()) {
  <!-- Overlay fosc -->
  <div class="chat-overlay" (click)="onTancar()"></div>

  <!-- Panell -->
  <div class="chat-panel">
    <div class="chat-panel__handle"></div>

    <div class="chat-panel__header">
      <h3 class="chat-panel__titulo">🌱 Asistente del huerto</h3>
      <button class="chat-panel__cerrar" type="button" (click)="onTancar()" aria-label="Cerrar">✕</button>
    </div>

    <!-- Missatges -->
    <div class="chat-panel__missatges" #missatgesRef>
      @for (m of missatges(); track $index) {
        <div class="bombolla"
             [class.bombolla--user]="m.rol === 'user'"
             [class.bombolla--assistant]="m.rol === 'assistant'">
          @for (img of m.imatges ?? []; track $index) {
            <img [src]="'data:image/jpeg;base64,' + img"
                 alt="Foto"
                 class="bombolla__imatge" />
          }
          @if (m.text) {
            <span>{{ m.text }}</span>
          }
        </div>
      }

      @if (carregant()) {
        <div class="bombolla bombolla--assistant bombolla--carregant">
          <span class="punt"></span>
          <span class="punt"></span>
          <span class="punt"></span>
        </div>
      }
    </div>

    <!-- Footer -->
    <div class="chat-panel__footer">

      <div class="chat-input-row">
        <!-- Botó foto (obre l'input de fitxer ocult) -->
        <button type="button" class="chat-foto-btn"
                (click)="fileInput.click()" [disabled]="carregant()" aria-label="Adjuntar foto">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </button>
        <input #fileInput type="file" accept="image/*" multiple hidden (change)="seleccionarImatge($event)" />

        <!-- Input integrat: fotos adjuntes (si n'hi ha) + text -->
        <div class="chat-footer__input-wrapper">
          @if (imatges().length > 0) {
            <div class="chat-footer__fotos-preview">
              @for (img of imatges(); track $index) {
                <div class="chat-footer__foto-preview">
                  <img [src]="'data:image/jpeg;base64,' + img"
                       alt="Foto adjunta"
                       class="chat-footer__foto-img" />
                  <button type="button" class="chat-footer__foto-eliminar"
                          (click)="eliminarImatge($index)"
                          aria-label="Eliminar foto">✕</button>
                </div>
              }
            </div>
          }
          <input
            class="chat-footer__text"
            type="text"
            placeholder="Escribe un mensaje…"
            [ngModel]="inputText()"
            (ngModelChange)="inputText.set($event)"
            (keyup.enter)="enviarMissatge()"
            [disabled]="carregant()" />
        </div>

        <!-- Enviar -->
        <button type="button" class="chat-enviar"
                (click)="enviarMissatge()"
                [disabled]="carregant() || (!inputText().trim() && !imatges().length)">
          Enviar
        </button>
      </div>
    </div>
  </div>
}
