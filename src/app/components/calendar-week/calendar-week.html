<div class="calendar-strip">
   @for (day of week; track day.name) {
      <div class="day" [class.active]="day.isToday">
         <span class="day-line1">{{ day.name }} {{ day.date }}</span>
         <span class="day-line2">
            <svg class="weather-icon-svg"
               [class.is-sun]="day.icon === weatherService.iconoSol"
               [class.is-rain]="weatherService.esLluvia(day.icon)"
               [lucideIcon]="day.icon"></svg>
            @if (day.tempMax !== null) {
               <span class="day-temp">{{ day.tempMax }}°</span>
            }
         </span>
      </div>
   }
</div>
