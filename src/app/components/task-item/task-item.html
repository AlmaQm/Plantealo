<div class="task-card" [class.completed]="task.completed">

   <span class="icon">
      <img [src]="task.image" [alt]="task.title">
   </span>

   <div class="info">
      <h3>{{ task.title }}</h3>
      <p>{{ task.description }}</p>
   </div>

   <input type="checkbox" [checked]="task.completed" (change)="toggleTask()">

</div>
