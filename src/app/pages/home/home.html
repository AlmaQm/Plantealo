<main class="container">
   <header>
      <h1>Mi Huerto</h1>
      <a class="profile-avatar" routerLink="/perfil" aria-label="Ir a mi perfil">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
         </svg>
      </a>
   </header>

   <section class="zone">
      <span class="zone-label">Hoy</span>

      <app-weather-card></app-weather-card>

      <div class="zone-block">
         <h3>Tareas de Hoy</h3>
         <div class="tasks-list">
            @for (t of tasksVisibles(); track t.id) {
               <app-task-item [task]="t" (toggle)="toggleTask($event)"></app-task-item>
            } @empty {
               <p class="tasks-empty">No tienes plantas en tu huerto aún. ¡Añade alguna!</p>
            }
         </div>
         @if (tasks().length > 3) {
            <button class="ver-todas-btn" (click)="toggleMostrarTodasTareas()">
               @if (mostrarTodasTareas()) {
                  Ver menos
               } @else {
                  Ver las {{ tasks().length - 3 }} tareas restantes
               }
            </button>
         }
      </div>
   </section>

   <section class="zone">
      <span class="zone-label">Esta semana</span>

      <app-calendar-week></app-calendar-week>

      <div class="zone-block">
         <app-diet-recommendations></app-diet-recommendations>
      </div>
   </section>

   <section class="zone-flat">
      <span class="zone-label">Tu huerto</span>
      <app-summary-card></app-summary-card>
   </section>
</main>
