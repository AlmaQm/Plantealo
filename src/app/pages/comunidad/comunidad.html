<div class="comunidad-page">

  <header class="comunidad-page__header">
    <div>
      <h1 class="comunidad-page__titulo">Comunidad</h1>
      <p class="comunidad-page__subtitulo">Comparte y descubre con otros jardineros</p>
    </div>
  </header>

  <div class="comunidad-page__feed">
    @for (pub of feed(); track pub.publicacion_id) {
      <app-publicacion-card [publicacion]="pub" />
    }
  </div>

</div>

<!-- FAB -->
<button class="fab" (click)="abrirModal()" aria-label="Nueva publicación">+</button>

<!-- Overlay + Modal centrado -->
@if (modalAbierto()) {
  <div class="modal-overlay" (click)="cerrarModal()"></div>
  <div class="modal-dialog">

    <div class="modal-dialog__header">
      <h3 class="modal-dialog__titulo">Crear Publicación</h3>
      <button class="modal-dialog__cerrar" (click)="cerrarModal()" aria-label="Cerrar">✕</button>
    </div>

    <div class="modal-dialog__body">

      <label class="campo-label">Tipo de publicación</label>
      <select class="campo-select"
        [ngModel]="nuevaCategoria()"
        (ngModelChange)="nuevaCategoria.set($event)">
        @for (cat of categorias; track cat) {
          <option [value]="cat">{{ cat | titlecase }}</option>
        }
      </select>

      <label class="campo-label campo-label--mt">Imagen</label>
      <div class="upload-zone" (click)="fileInput.click()">
        <svg class="upload-zone__icono" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <span class="upload-zone__texto">Haz clic para subir una imagen</span>
        <input #fileInput type="file" accept="image/*" class="upload-input"
               (change)="onImagenSeleccionada($event)">
      </div>
      @if (nuevaImagenPreview()) {
        <img class="imagen-preview" [src]="nuevaImagenPreview()" alt="Vista previa">
      }

      <label class="campo-label campo-label--mt">Descripción</label>
      <textarea
        class="campo-textarea"
        placeholder="Cuéntanos sobre tu planta, receta o huerto..."
        rows="4"
        [ngModel]="nuevaDesc()"
        (ngModelChange)="nuevaDesc.set($event)">
      </textarea>

      @if (error()) {
        <p class="campo-error">{{ error() }}</p>
      }

    </div>

    <div class="modal-dialog__footer">
      <button class="btn-publicar-full" [disabled]="!nuevaDesc().trim() || publicando()" (click)="publicar()">
        {{ publicando() ? 'Publicando...' : 'Publicar' }}
      </button>
    </div>

  </div>
}
