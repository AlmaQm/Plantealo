<div class="recetas-page">
   <div class="recetas-page__header">
    <h1>🍳 Recetas Personalizadas</h1>
    <p>Basadas en tu huerto y preferencias {{ getDietaText() }}</p>
  </div>
  
  <!-- <div class="recetas-page__search">
    <div class="search-box">
      <input 
        type="text" 
        [(ngModel)]="searchTerm" 
        (ngModelChange)="onSearchChange()"
        placeholder="Buscar recetas por nombre o ingredientes..."
        class="search-input">
      <span class="search-icon">🔍</span>
    </div>
  </div> -->
  
  <div class="recetas-page__filters">
    <div class="search-box">
      <input 
        type="text" 
        [(ngModel)]="searchTerm" 
        (ngModelChange)="onSearchChange()"
        placeholder="Buscar recetas..."
        class="search-input">
    </div>
    
    
  </div>
  
  <div class="recetas-page__grid" *ngIf="!loading; else loadingTemplate">
    <app-receta-card 
      *ngFor="let recipe of filteredRecipes"
      [recipe]="recipe"
      [compatibilityPercentage]="getCompatibility(recipe)"
      (recipeClick)="openRecipeDetail($event)">
    </app-receta-card>
    
    <div *ngIf="filteredRecipes.length === 0" class="no-results">
      <p>No se encontraron recetas con estos filtros</p>
    </div>
  </div>
  
  <app-receta-window 
    *ngIf="selectedRecipe"
    [recipe]="selectedRecipe"
    [gardenPlants]="gardenPlants"
    (close)="closeRecipeDetail()">
  </app-receta-window>
</div>

<ng-template #loadingTemplate>
  <div class="loading-spinner">
    <div class="spinner"></div>
    <p>Cargando recetas...</p>
  </div>
</ng-template>
