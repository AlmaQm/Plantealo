<ion-header translucent="true">
  <ion-toolbar color="light">
    <ion-title>Receptes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="page-container">

  <div class="recipes-grid">
    <app-receta-card
      *ngFor="let receta of recipes"
      [receta]="receta"
      (click)="openRecipe(receta)">
    </app-receta-card>
  </div>

</ion-content>
